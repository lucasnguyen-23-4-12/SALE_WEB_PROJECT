<!DOCTYPE html>
<html lang="vi">
<head>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký tài khoản</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/auth/register.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="top-strip"></div>

    <div class="main-header">
      <a href="../core/landing.html" class="logo-box" aria-label="Trang Landing">
        <img src="../../images/modern-logo-with-gradient-squares.png" alt="2D1C Logo">
      </a>

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Tim kiem san pham">
      </div>

      <div class="header-icons">
        <a href="../user/notification.html"><i class="fa-solid fa-bell"></i></a>
        <a href="../cart/cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="../user/profile.html"><i class="fa-solid fa-user"></i></a>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="page-wrap">
    <section class="auth-card">
      <h1 class="auth-title">
        ĐĂNG KÝ <span>TÀI KHOẢN</span>
      </h1>

            <form class="auth-form" id="registerForm">
        <div class="form-group">
          <input type="text" id="registerName" placeholder="Full name">
        </div>

        <div class="form-group">
          <input type="email" id="registerEmail" placeholder="Email">
        </div>

        <div class="form-group otp-group">
          <input type="text" id="registerOtp" maxlength="6" inputmode="numeric" placeholder="6-digit verification code">
          <button type="button" id="sendOtpBtn" class="otp-send-btn">Send code</button>
        </div>
        <p class="otp-note" id="otpStatusText">OTP is valid for 10 minutes.</p>

        <div class="form-group password-group">
          <input type="password" id="registerPassword" placeholder="Password">
          <button type="button" class="eye-btn">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <div class="form-group password-group">
          <input type="password" id="registerConfirmPassword" placeholder="Confirm password">
          <button type="button" class="eye-btn">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <p class="login-text">
          Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
        </p>

        <button type="submit" class="register-btn">Đăng ký</button>

        <div class="divider">
          <span>Hoặc đăng ký với</span>
        </div>

        <div id="googleRegisterBtn"></div>
      </form>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-col">
      <h3>Về Website</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>

    <div class="footer-col">
      <h3>Liên kết</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>

    <div class="footer-col">
      <h3>Hỗ trợ</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>

    <div class="footer-col">
      <h3>Theo dõi</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>
  </footer>

  <script src="../../js/core/common.js"></script>
  <script src="../../js/auth/register.js"></script>
</body>
</html>
