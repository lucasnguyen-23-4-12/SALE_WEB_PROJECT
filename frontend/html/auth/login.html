<!DOCTYPE html>
<html lang="vi">
<head>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập tài khoản</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/auth/login.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <header class="site-header">
    <div class="top-strip"></div>

    <div class="main-header">
      <a href="../core/landing.html" class="logo-box" aria-label="Trang Landing">
        <img src="../../images/modern-logo-with-gradient-squares.png" alt="2D1C Logo">
      </a>

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Tìm kiếm sản phẩm">
      </div>

      <div class="header-icons">
        <a href="../user/notification.html"><i class="fa-solid fa-bell"></i></a>
        <a href="../cart/cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="../user/profile.html"><i class="fa-solid fa-user"></i></a>
      </div>
    </div>
  </header>

  <main class="page-wrap">
    <section class="auth-card">
      <h1 class="auth-title">
        ĐĂNG NHẬP <span>TÀI KHOẢN</span>
      </h1>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <input type="email" id="loginEmail" placeholder="Email">
        </div>

        <div class="form-group password-group">
          <input type="password" id="loginPassword" placeholder="Mật khẩu">
          <button type="button" class="eye-btn">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>

        <div class="login-row">
          <label class="remember-wrap">
            <input type="checkbox">
            <span>Ghi nhớ đăng nhập</span>
          </label>

          <a href="forgot-password.html" class="forgot-link">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="register-btn">Đăng nhập</button>

        <p class="login-text">
          Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </p>

        <div class="divider">
          <span>Hoặc đăng nhập với</span>
        </div>

        <div id="googleLoginBtn"></div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-col">
      <h3>Về Website</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>

    <div class="footer-col">
      <h3>Liên kết</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>

    <div class="footer-col">
      <h3>Hỗ trợ</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>

    <div class="footer-col">
      <h3>Theo dõi</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>
  </footer>

  <script src="../../js/core/common.js"></script>
  <script src="../../js/auth/login.js"></script>
</body>
</html>
