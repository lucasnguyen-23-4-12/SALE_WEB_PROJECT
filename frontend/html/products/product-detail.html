<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết sản phẩm - TAM TAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../../css/products/product-detail.css">
</head>
<body>
  <header class="site-header">
    <div class="top-strip"></div>
    <div class="main-header">
      <a href="../core/landing.html" class="logo-box" aria-label="Trang Landing">
        <img src="../../images/modern-logo-with-gradient-squares.png" alt="TAM TAI Logo">
      </a>

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" placeholder="Tìm kiếm sản phẩm">
      </div>

      <div class="header-icons">
        <a href="../user/notification.html" aria-label="Thông báo"><i class="fa-solid fa-bell"></i></a>
        <a href="../cart/cart.html" aria-label="Giỏ hàng"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="../user/profile.html" aria-label="Tài khoản"><i class="fa-solid fa-user"></i></a>
      </div>
    </div>
  </header>

  <main class="page-wrap">
    <h1 class="page-title">TRANG CHI TIẾT SẢN PHẨM</h1>

    <section class="breadcrumb-row">
      <a href="../core/landing.html">Trang chủ</a>
      <span>/</span>
      <a href="products.html">Sản phẩm 1</a>
      <span>/</span>
      <strong>iphone 6</strong>
    </section>

    <section class="detail-card">
      <div class="image-area">
        <div class="image-box">
          <img src="../../images/acer-refurbished-laptop-500x500.webp" alt="Hình ảnh sản phẩm">
          <span>HÌNH ẢNH</span>
        </div>
      </div>

      <article class="info-area">
        <p class="tag">Sản phẩm 1</p>
        <h2>iPhone 6</h2>

        <div class="rating-row">
          <span class="stars">★★★★★</span>
          <span>5.0 | 58 sản phẩm</span>
        </div>

        <p class="price">10.000.000đ</p>

        <h3>Mô tả sản phẩm</h3>
        <p class="desc">Mô tả ở đây</p>

        <div class="qty-wrap">
          <label>Số lượng</label>
          <div class="qty-box">
            <button type="button">-</button>
            <span>1</span>
            <button type="button">+</button>
          </div>
        </div>

        <div class="action-row">
          <button type="button" class="btn-cart"><i class="fa-solid fa-cart-shopping"></i> Thêm vào giỏ</button>
          <button type="button" class="btn-buy">Mua ngay</button>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-col">
      <h3>Về Website</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>
    <div class="footer-col">
      <h3>Liên kết</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>
    <div class="footer-col">
      <h3>Hỗ trợ</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>
    <div class="footer-col">
      <h3>Theo dõi</h3>
      <a href="#">Dành ở đây</a>
      <a href="#">Dành ở đây</a>
    </div>
  </footer>

  <script src="../../js/core/common.js?v=20260408"></script>
  <script src="../../js/products/product-detail.js?v=20260408"></script>
</body>
</html>
